name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Audit dependencies for known vulnerabilities
        working-directory: webapp
        run: npm audit --audit-level=high

  integration-test:
    name: Integration Tests (webapp + MySQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Start webapp and database
        run: docker compose up -d --build mysqldb webapp

      - name: Wait for webapp to become ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null; then
              echo "webapp is up"
              exit 0
            fi
            sleep 2
          done
          echo "webapp did not become ready in time"
          docker compose logs
          exit 1

      - name: Install test dependencies
        working-directory: webapp
        run: npm ci

      - name: Run integration tests
        working-directory: webapp
        env:
          BASE_URL: http://localhost:3000
          DB_HOST: localhost
          DB_USER: user
          DB_PASSWORD: pass
          DB_NAME: testdb
        run: npm run test:integration

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  ui-test:
    name: UI Tests (Playwright, over HTTP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Start webapp and database
        run: docker compose up -d --build mysqldb webapp

      - name: Wait for webapp to become ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null; then
              echo "webapp is up"
              exit 0
            fi
            sleep 2
          done
          echo "webapp did not become ready in time"
          docker compose logs
          exit 1

      - name: Install test dependencies
        working-directory: webapp
        run: npm ci

      - name: Install Playwright browser
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        working-directory: webapp
        env:
          BASE_URL: http://localhost:3000
        run: npm run test:ui

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
