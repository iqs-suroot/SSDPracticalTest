server {
    listen 80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Docker's embedded DNS. Re-resolve the webapp hostname per request
    # (via the variable below) instead of caching one IP for nginx's
    # whole process lifetime — otherwise a webapp container restart
    # (new IP) leaves nginx stuck proxying to a dead address.
    resolver 127.0.0.11 valid=10s;

    location / {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        set $webapp_upstream http://webapp:3000;
        proxy_pass $webapp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
